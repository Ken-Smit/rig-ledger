services:
  # Backend API
  - type: web
    name: rig-ledger-api
    runtime: docker
    rootDir: Server
    dockerfilePath: ./Server/Dockerfile
    dockerContext: ./Server
    envVars:
      - key: MONGODB_URI
        sync: false # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GIN_MODE
        value: release
      # Apex is canonical; www 301s to apex, so the SPA runs on this exact
      # origin. CORS allows a single exact origin — must match the browser's
      # Origin after the www->apex redirect. Verification / reset link host
      # (appBaseURL) falls back to this same value, so no separate
      # APP_BASE_URL is needed.
      - key: ALLOWED_ORIGIN
        value: https://rig-ledger.com
      # Resend transactional email — required in release mode (server fails
      # fast at boot if either is missing).
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  # Frontend Static Site
  - type: web
    name: rig-ledger
    env: static
    rootDir: Client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.rig-ledger.com
