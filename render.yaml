services:
  # Backend API
  - type: web
    name: rig-ledger-api
    runtime: docker
    rootDir: Server
    dockerfilePath: ./Server/Dockerfile
    dockerContext: ./Server
    envVars:
      - key: MONGODB_URI
        sync: false # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GIN_MODE
        value: release
      - key: ALLOWED_ORIGIN
        value: https://app.rig-ledger.com
      # Frontend origin for verification / reset links. Falls back to
      # ALLOWED_ORIGIN in code, but set explicitly for clarity.
      - key: APP_BASE_URL
        value: https://app.rig-ledger.com
      # Resend transactional email — required in release mode (server fails
      # fast at boot if either is missing).
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  # Frontend Static Site
  - type: web
    name: rig-ledger
    env: static
    rootDir: Client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      # Security headers for every document served by the SPA host. CSP scopes
      # the SPA to its own origin: it may only talk to the API origin
      # (connect-src), inline styles are allowed (Vite/Tailwind emit them),
      # scripts must be same-origin, and the app can never be framed.
      # connect-src must match the origin the SPA actually calls — VITE_API_URL
      # below (https://api.rig-ledger.com). The onrender host is kept as a
      # fallback during the custom-domain migration; drop it once migration is
      # complete.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; connect-src 'self' https://api.rig-ledger.com https://rig-ledgerapi.onrender.com; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'"
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      # Hashed build assets (Vite emits content-hashed filenames under /assets)
      # are immutable: a content change yields a new filename, so they can be
      # cached forever. Listed before the /* no-cache rule; Render applies the
      # most specific matching path.
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
      # index.html (and anything not under /assets) must never be cached, or
      # users get stale HTML pointing at deleted asset hashes after a deploy.
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.rig-ledger.com
