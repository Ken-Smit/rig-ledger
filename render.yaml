services:
  # Backend API
  - type: web
    name: rig-ledger-api
    runtime: docker
    rootDir: Server
    dockerfilePath: ./Server/Dockerfile
    dockerContext: ./Server
    envVars:
      - key: MONGODB_URI
        sync: false # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GIN_MODE
        value: release
      - key: ALLOWED_ORIGIN
        value: https://app.rig-ledger.com
      # Frontend origin for verification / reset links. Falls back to
      # ALLOWED_ORIGIN in code, but set explicitly for clarity.
      - key: APP_BASE_URL
        value: https://app.rig-ledger.com
      # Resend transactional email — required in release mode (server fails
      # fast at boot if either is missing).
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false

  # Frontend Static Site
  - type: web
    name: rig-ledger
    env: static
    rootDir: Client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.rig-ledger.com
