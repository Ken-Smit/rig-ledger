services:
  # Backend API
  - type: web
    name: rig-ledger-api
    runtime: docker
    dockerfilePath: ./Server/Dockerfile
    dockerContext: .
    envVars:
      - key: MONGODB_URI
        sync: false # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: GIN_MODE
        value: release
      - key: ALLOWED_ORIGIN
        value: https://rig-ledger.onrender.com

  # Frontend Static Site
  - type: web
    name: rig-ledger
    env: static
    buildCommand: cd Client && npm install && npm run build
    staticPublishPath: Client/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://rig-ledger-api.onrender.com
